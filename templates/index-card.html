<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приглашение на день рождения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style-card.css" />
</head>
<body>
  <div class="page-glow glow-left"></div>
  <div class="page-glow glow-right"></div>
  <div class="noise"></div>

  <main class="invite-screen">
    <div class="ambient-haze haze-left"></div>
    <div class="ambient-haze haze-right"></div>
    <div class="ambient-haze haze-bottom"></div>

    <div class="smoke smoke-one"></div>
    <div class="smoke smoke-two"></div>
    <div class="smoke smoke-three"></div>

    <div class="atmos-particles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <section class="invite-card" aria-label="Приглашение на день рождения">
      <div class="card-shine"></div>
      <p class="invite-overline">Приглашение на день рождения</p>

      <h1 class="invite-name">Никита</h1>

      <div class="divider"></div>

      <p class="invite-text">
        Приглашаю вас провести этот вечер вместе со мной
        на моём дне рождения — за кальяном, напитками и лёгкими закусками.
        А дальше нас ждут музыка, атмосфера и танцы.
      </p>

      <div class="invite-meta">
        <p class="invite-date">25 АПРЕЛЯ · 18:00</p>
        <p class="invite-place">Место: LOUNGE BAR ХО</p>
        <p class="invite-address">Адрес: Средне-Московская, 5</p>
      </div>

      <div class="invite-actions">
        <a class="invite-button" href="https://t.me/tounerrr" target="_blank" rel="noopener noreferrer">Подтвердить присутствие</a>
      </div>
    </section>
  </main>

  <script src="assets/js/main-card.js"></script>
</body>
</html>
