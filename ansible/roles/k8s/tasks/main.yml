---
- name: Check if k3s is installed
  ansible.builtin.command: which k3s
  register: k3s_binary
  changed_when: false
  failed_when: k3s_binary.rc != 0

- name: Show k3s binary path
  ansible.builtin.debug:
    var: k3s_binary.stdout

- name: Check k3s version
  ansible.builtin.command: k3s --version
  register: k3s_version
  changed_when: false

- name: Show k3s version
  ansible.builtin.debug:
    var: k3s_version.stdout_lines

- name: Check cluster nodes via k3s kubectl
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  changed_when: false

- name: Show cluster nodes
  ansible.builtin.debug:
    var: k3s_nodes.stdout_lines
